services:

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
    restart: always
    networks:
      - inception
  
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - credentials
    restart: always
    networks:
      - inception
  
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    depends_on:
      - wordpress
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "443:443"
    restart: always
    networks:
      - inception

volumes:

  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hugo-mar/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hugo-mar/data/wordpress

networks:
  inception:
    driver: bridge

secrets:

  db_root_password:
    file: ../secrets/db_root_password.txt

  db_password:
    file: ../secrets/db_password.txt

  credentials:
    file: ../secrets/credentials.txt