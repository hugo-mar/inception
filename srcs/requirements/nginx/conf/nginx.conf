# Run worker processes as the 'www-data' user (non-privileged web user)
user www-data;

events {
	# Maximum number of simultaneous connections per worker process
	worker_connections 1024;
}

http {
	# Load MIME types (maps file extensions to Content-Type headers)
	include /etc/nginx/mime.types;

	# Default MIME type if none is matched
	default_type application/octet-stream;

	# Enable efficient file transfer using sendfile() syscall
	sendfile on;

	# Time (in seconds) to keep idle connections open (keep-alive)
	keepalive_timeout 65;

	server {
		# Listen on port 443 (HTTPS) with SSL/TLS enabled
		listen 443 ssl;

		# Domain name this server block responds to
		server_name hugo-mar.42.fr;

		# Path to SSL certificate (public certificate)
		ssl_certificate /etc/nginx/ssl/inception.crt;

		# Path to private key corresponding to the certificate
		ssl_certificate_key /etc/nginx/ssl/inception.key;

		# Allow only modern and secure TLS versions
		ssl_protocols TLSv1.2 TLSv1.3;

		# Root directory for serving files
		root /var/www/html;

		# Default index files (priority order)
		index index.php index.html;

		location / {
			# Try to serve:
			# 1. Exact file ($uri)
			# 2. Directory ($uri/)
			# 3. Otherwise, pass request to index.php with query string
			# This is essential for WordPress "pretty URLs"
			try_files $uri $uri/ /index.php?$args;
		}

		location ~ \.php$ {
			# Include standard FastCGI parameters (headers, request info, etc.)
			include fastcgi_params;

			# Pass PHP requests to the WordPress container (PHP-FPM) on port 9000
			fastcgi_pass wordpress:9000;

			# Full path to the PHP script to execute
			# Combines document root with requested script name
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		}
	}
}