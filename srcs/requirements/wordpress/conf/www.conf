[www]

; User/group that will run PHP-FPM worker processes (standard Debian web user)
user = www-data
group = www-data

; PHP-FPM listens for FastCGI requests on TCP port 9000 and allows connections from other containers
listen = 0.0.0.0:9000

; Process manager uses dynamic mode to scale workers based on load
pm = dynamic

; Maximum number of child processes
pm.max_children = 5

; Number of workers created when PHP-FPM starts
pm.start_servers = 2

; Minimum number of idle workers
pm.min_spare_servers = 1

; Maximum number of idle workers
pm.max_spare_servers = 3

; Send PHP worker output to Docker logs instead of log files
catch_workers_output = yes

; Log PHP errors to standard error so they appear in `docker logs`
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Only allow execution of .php files (prevents PHP execution in upload directories)
security.limit_extensions = .php